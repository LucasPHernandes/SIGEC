{% extends "base.html" %}

{% block title %}Recuperar Senha - SIGEC{% endblock %}

{% block public_content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='images/logo-iffar.png') }}" alt="IFFar" class="login-logo">
            <h2>Recuperar Senha</h2>
            <p>Digite seu e-mail para receber o link de recuperação</p>
        </div>
        
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Enviar Link de Recuperação</button>
        </form>
        
        <div class="login-footer">
            <p><a href="{{ url_for('login') }}">← Voltar para o login</a></p>
        </div>
    </div>
</div>

<style>
.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--iffar-green) 0%, var(--iffar-green-light) 100%);
    padding: 20px;
}

.login-card {
    background: white;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 450px;
    padding: 40px;
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-logo {
    height: 80px;
    margin-bottom: 20px;
}

.login-header h2 {
    margin: 0 0 10px 0;
    color: #212529;
}

.login-header p {
    color: #6c757d;
    margin: 0;
}

.login-form .form-group {
    margin-bottom: 20px;
}

.login-form label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #495057;
}

.login-form .form-control {
    width: 100%;
    padding: 12px;
    border: 2px solid #e9ecef;
    border-radius: var(--radius-sm);
    font-size: 1rem;
    transition: all 0.2s;
}

.login-form .form-control:focus {
    border-color: var(--primary);
    outline: none;
    box-shadow: 0 0 0 3px rgba(0, 66, 12, 0.1);
}

.btn-block {
    width: 100%;
    padding: 12px;
    font-size: 1rem;
}

.login-footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #e9ecef;
}

.login-footer a {
    color: var(--primary);
    text-decoration: none;
}

.login-footer a:hover {
    text-decoration: underline;
}
</style>
{% endblock %}
