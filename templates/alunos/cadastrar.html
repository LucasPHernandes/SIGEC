{% extends "base.html" %}

{% block title %}Novo Aluno - SIGEC{% endblock %}

{% block page_title %}Novo Aluno{% endblock %}

{% block content %}
<div class="container-fluid" style="padding: 20px; max-width: 800px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            <h3>Informações do Aluno</h3>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Nome completo *</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Matrícula *</label>
                        <input type="text" name="matricula" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Data de Nascimento</label>
                        <input type="date" name="data_nascimento" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">CPF</label>
                        <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Telefone</label>
                        <input type="text" name="telefone" class="form-control" placeholder="(55) 99999-9999">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Turma</label>
                        <select name="turma_id" class="form-control">
                            <option value="">Selecione uma turma</option>
                            {% for turma in turmas %}
                            <option value="{{ turma.id }}">{{ turma.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Situação</label>
                        <select name="situacao" class="form-control">
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                            <option value="transferido">Transferido</option>
                            <option value="formado">Formado</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Endereço</label>
                    <textarea name="endereco" class="form-control" rows="2"></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Foto</label>
                    <input type="file" name="foto" class="form-control" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Observações</label>
                    <textarea name="observacoes" class="form-control" rows="3"></textarea>
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                    <a href="{{ url_for('listar_alunos') }}" class="btn btn-outline">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Salvar Aluno</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
